<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - S.K. Hotels</title>
        <link rel="stylesheet" href="../static/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>

    <body class="auth-page" data-flash-message="{{ flash_message }}">
        
        <script src="{{ url_for('static', filename='alert.js') }}"></script>

        <div class="auth-container">
            <a href="{{ url_for('home') }}" class="auth-logo-link">
                <img src="../static/Logo.png" class="auth-logo" alt="S.K. Restaurant">
            </a>

            <div class="auth-card">
                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Sign in to your S.K. Restaurant account</p>

                <form action="/login" method="POST">
                    
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" name="Email" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="password" name="Password" placeholder="Enter your password" required>
                    </div>

                    <div class="auth-actions">
                        <a href="/forget" class="auth-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-submit">Sign In</button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="/signup" class="auth-link gold-link">Sign up here</a></p>
                </div>
            </div>
        </div>
    </body>
</html>
