<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order for Delivery - S.K. Hotels Group</title>
    <link rel="stylesheet" href="../static/style.css">
    <script src="../script.js" defer></script>
</head>
<body>
    <div class="container">
        <h2>Order for Home Delivery</h2>
        <p id="flash-message"></p>
        <form id="delivery-form">
            <div class="form-group">
                <label for="Order">Your Order</label>
                <textarea id="Order" name="Order" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="Address">Delivery Address</label>
                <textarea id="Address" name="Address" rows="3" required></textarea>
            </div>
            <button type="submit">Confirm Delivery Order</button>
        </form>
         <div class="form-links">
            <a href="Kathiyawad.html">Back to Home</a>
        </div>
    </div>
</body>
</html>
