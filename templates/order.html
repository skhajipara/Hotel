<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Food - S.K. Hotels</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page" data-flash-message="{{ flash_message }}">
    <script src="{{ url_for('static', filename='alert.js') }}"></script>
    
    <div class="auth-container" style="max-width: 550px;">
        <a href="{{ url_for('home') }}" class="auth-logo-link">
            <img src="../static/Logo.png" class="auth-logo" alt="S.K. Restaurant">
        </a>
        
        <div class="auth-card">
            <h2>Place Your Order</h2>
            <p class="auth-subtitle">Tell us what you'd like to enjoy at your table.</p>

            <form action="/submit" method="POST">
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" name="Customer_Name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="Email" placeholder="Enter your registered email" required>
                </div>
                
                <div class="form-group">
                    <label for="table"><i class="fas fa-chair"></i> Table Number</label>
                    <input type="number" id="table" name="Table_No" min="1" max="100" placeholder="Table 1 to 100" title="We have tables from 1 to 100" oninvalid="this.setCustomValidity('Please enter a valid table number between 1 and 100')" oninput="this.setCustomValidity('')" required>
                </div>

                <div class="form-group">
                    <label for="order"><i class="fas fa-concierge-bell"></i> Your Order</label>
                    <textarea id="order" name="Order" placeholder="E.g., 2 Kathiyawadi Thali, 1 Buttermilk..." required></textarea>
                </div>

                <div style="margin-top: 25px;">
                    <button type="submit" class="btn-submit">Confirm Order</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
