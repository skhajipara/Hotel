<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Room - S.K. Hotels Group</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h2>Book a Room</h2>
        <p id="flash-message"></p>
        <form id="room-booking-form">
            <div class="form-group">
                <label for="Room_No">Room Number (e.g., 101-130, 201-230)</label>
                <input type="number" id="Room_No" name="Room_No" required>
            </div>
            <div class="form-group">
                <label for="Entry_Time">Check-in Time</label>
                <input type="datetime-local" id="Entry_Time" name="Entry_Time" required>
            </div>
             <div class="form-group">
                <label for="Exit_Time">Check-out Time</label>
                <input type="datetime-local" id="Exit_Time" name="Exit_Time" required>
            </div>
            <button type="submit">Book Room</button>
        </form>
         <div class="form-links">
            <a href="Kathiyawad.html">Back to Home</a>
        </div>
    </div>
</body>
</html>
